<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>visual-kerning recorder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@100..900&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f2f2f0;
        --ink: #1a1a1a;
        --muted: #727270;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.6), transparent 36%),
          linear-gradient(180deg, #f5f5f3 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      main {
        text-align: center;
        padding: 0 48px;
        margin-top: -40px;
      }

      .hero {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 173px;
        letter-spacing: 0.04em;
        line-height: 1;
        margin: 0;
      }

      .lead {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 35px;
        color: var(--muted);
        margin: -8px 0 0;
        line-height: 1.5;
      }
      .visual-kerning-gap-marker {
        width: 5px !important;
      }
      .visual-kerning-help {
        display: none !important;
      }
      .visual-kerning-value {
        font-size: 24px !important;
        padding: 8px 14px !important;
        border-radius: 8px !important;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="hero">VISUAL KERNING</h1>
      <p class="lead">Fine-tune letter spacing directly in the browser.</p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
