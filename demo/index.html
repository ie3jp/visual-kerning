<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>visual kerning demo</title>
    <meta property="og:title" content="visual kerning demo" />
    <meta property="og:description" content="Fine-tune letter spacing directly in the browser." />
    <meta property="og:image" content="https://raw.githubusercontent.com/ie3jp/visual-kerning/main/.github/readme/ogp.gif" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <script>
      (function () {
        var STORAGE_KEY = 'visual-kerning-demo-lang'
        var saved = localStorage.getItem(STORAGE_KEY)
        var lang = saved || (navigator.language || '').split('-')[0]
        var dest = lang === 'ja' ? 'ja/' : 'en/'
        location.replace(dest)
      })()
    </script>
  </head>
  <body>
    <noscript>
      <p><a href="en/">English</a> | <a href="ja/">日本語</a></p>
    </noscript>
  </body>
</html>
